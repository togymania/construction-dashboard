name: CI

# Faz 0 — basic quality gate. Runs on every push and PR so regressions
# in the backend (lint + tests) or the frontend (type-check) are caught
# before they reach production.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      # Ruff is advisory for now: this is the first CI on a large existing
      # codebase that predates linting, so it carries legacy style debt
      # (FastAPI Depends/Query defaults, timezone.utc, import order). Kept
      # non-blocking so it reports without failing the build; tests are the
      # hard gate. Tighten to blocking once the backlog is cleared.
      - name: Lint (ruff, advisory)
        run: ruff check .
        continue-on-error: true

      - name: Run tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend (type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npx eslint src --max-warnings=0
        continue-on-error: true
