# Render Blueprint for the ConstructHub backend.
#
# Free tier compatible -- no persistent disk (uploads land in the
# ephemeral ./uploads dir, lost on restart but extracted PDF data is
# already persisted in Postgres so the UX impact is minimal for demos).
#
# Secret env vars (DATABASE_URL_OVERRIDE, ANTHROPIC_API_KEY,
# SECRET_KEY, CORS_ORIGINS) must be entered manually in the Render
# dashboard. Listed below with sync: false so they stay out of the
# synced blueprint.
services:
  - type: web
    name: monotek-stroy-pm-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5
      - key: LLM_TIMEOUT_SECONDS
        value: "120"
      - key: MAX_PDF_SIZE_MB
        value: "100"
      - key: MAX_LEDGER_IMPORT_MB
        value: "25"
      - key: MAX_IMPORT_FILE_SIZE_MB
        value: "10"
      - key: UPLOADS_DIR
        value: uploads
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
